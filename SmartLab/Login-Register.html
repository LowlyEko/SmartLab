<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAS Laboratory</title>
    <link rel="stylesheet" href="login-register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
</head>
  <body>

      <div class="container">
          <div class="form-box login">
              <form action="dashboard.html">
                  <h1>Login</h1>
                  <p class="form-subtitle">Sign in to your account</p>
                  <div class="section-label">Login as Administrator</div>
                  <div class="input-box">
                      <input type="text" placeholder="Username" required>
                      <i class="fa-solid fa-user"></i>
                  </div>
                  <div class="input-box">
                      <input type="password" placeholder="Password" required id="login-password">
                      <i class="fa-solid fa-lock"></i>
                      <img src="eye-slash-solid.png" id="login-eyeicon">
                  </div>
                  <div class="options-row">
                    <label class="checkbox-label">
                        <input type="checkbox"> Remember me
                    </label>  
                      <a href="#" class="forgot-link">Forgot Password?</a>
                  </div>
                  <button type="submit" class="btn-primary">Login</button>
                  <div class="divider">OR</div>
                <button class="btn-google">
                    <span class="google-logo"></span>
                    Login with Google
                </button>
                  
              </form>
          </div>

          <div class="form-box register">
              <form action="Login-Register.html">
                  <h1>Register</h1>
                  <div class="divider1">Personal Details</div>
                  <div class="input-box1">
                      <input type="text" placeholder="First Name" required>
                      <i class="fa-solid fa-user"></i>
                  </div>
                  <div class="input-box1">
                      <input type="text" placeholder="Middle Name" required>
                      <i class="fa-solid fa-user"></i>
                  </div>
                  <div class="input-box1">
                      <input type="text" placeholder="Last Name" required>
                      <i class="fa-solid fa-user"></i>
                  </div>
                  <div class="divider1">Account Details</div> 
                  <div class="input-box1">
                      <input type="text" placeholder="Username" required>
                      <i class="fa-solid fa-user"></i>
                  </div>
                  <div class="input-box1">
                      <input type="password" placeholder="Password" required id="register-password">
                      <i class="fa-solid fa-lock"></i>
                      <img src="eye-slash-solid.png" id="register-eyeicon">
                  </div>
                  <div class="agree-row">
                    <input type="checkbox" id="agree">
                    <label for="agree">
                        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                    </label>
                  </div>
                  <button type="submit" class="btn-primary1">Register</button>
              </form>
          </div>

          <div class="toggle-box">
              <div class="toggle-panel toggle-left">
                <div class="welcome-row">
                        <div class="logo-ring">
                            <img src="CAS Logo.png" alt="">
                        </div>
                    <div class="welcome-text">
                        <h2>Welcome to</h2>
                        <h1>CAS Laboratory</h1>
                    </div>
                </div>
                        <p class="subtitle">Your Gateway to Smart <br>CAS Laboratory Reservations</p>
                  <p class="tagline">Don't have an account?</p>
                  <button class="btn register-btn">Register</button>
              </div>

              <div class="toggle-panel toggle-right">
                   <div class="welcome-row">
                        <div class="logo-ring">
                            <img src="CAS Logo.png" alt="">
                        </div>
                    <div class="welcome-text">
                        <h2>Welcome to</h2>
                        <h1>CAS Laboratory</h1>
                    </div>
                </div>
                 <p class="tagline">Already have an account?</p> 
                  <button class="btn login-btn">Login</button>
              </div>
          </div>
      </div>

      <script src="login-register.js"></script>
  </body>
</html>
