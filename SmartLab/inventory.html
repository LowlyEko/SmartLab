<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAS Laboratory – Inventory</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="inventory.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
</head>
<body>
  <nav class="sidebar close">
    <header>
      <div class="image-text">
        <span class="image"><img src="CAS Logo.png" alt="Logo" onerror="this.style.display='none'"></span>
        <div class="text header-text">
          <div class="brand-name">CAS<span class="name">Laboratory</span></div>
        </div>
        <i class='bx bx-chevron-right toggle'></i>
      </div>
    </header>
    <div class="menu-bar">
      <div class="menu">
        <ul class="menu-links">
          <li class="nav-link"><a href="dashboard.html" data-page="dashboard"><i class='bx bxs-dashboard icon'></i><span class="text nav-text">Dashboard</span></a></li>
          <li class="nav-link"><a href="reservation.html" data-page="reservation"><i class='bx bx-calendar-check icon'></i><span class="text nav-text">Reservation</span></a></li>
          <li class="nav-link"><a href="calendar.html" data-page="calendar"><i class='bx bx-time icon'></i><span class="text nav-text">Calendar</span></a></li>
          <li class="nav-link"><a href="accountability.html" data-page="accountability"><i class='bx bx-shield icon'></i><span class="text nav-text">Accountability</span></a></li>
          <li class="nav-link"><a href="inventory.html" data-page="inventory"><span class="material-symbols-outlined icon">inventory_2</span><span class="text nav-text">Inventory</span></a></li>
          <li class="nav-link"><a href="transaction.html" data-page="transaction"><i class='bx bx-file icon'></i><span class="text nav-text">Transaction</span></a></li>
        </ul>
      </div>
      <div class="botton-content">
        <li class="mode">
          <div class="moon-sun">
            <i class='bx bx-moon icon moon'></i>
            <i class='bx bx-sun icon sun'></i>
          </div>
          <span class="mode-text text">Dark Mode</span>
          <div class="toggle-switch"><span class="switch"></span></div>
        </li>
      </div>
    </div>
  </nav>

  <div class="main-content">
    <header>
      <div class="header-icons">
        <i class="fa-solid fa-bell"></i>
        <i class="fa-solid fa-comment"></i>
        <div class="profile">
          <img src="profile.jpg" alt="">
          <i class="fa-solid fa-angle-down"></i>
          <ul class="dropdown-content">
            <li><a href="#">Profile</a></li>
            <li><a href="Login-Register.html">Logout</a></li>
          </ul>
        </div>
      </div>
    </header>

    <div class="page-content">
      <h1>Inventory</h1>

      <!-- Stats Row -->
      <div class="stats-row" id="statsRow"></div>

      <!-- Tab Switcher -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="equipment" onclick="switchTab('equipment')">
          <i class='bx bx-wrench tab-icon'></i> Equipment
        </button>
        <button class="tab-btn" data-tab="chemicals" onclick="switchTab('chemicals')">
          <i class='bx bx-test-tube tab-icon'></i> Chemicals
        </button>
        <button class="tab-btn" data-tab="items" onclick="switchTab('items')">
          <i class='bx bx-package tab-icon'></i> Items / Supplies
        </button>
      </div>

      <!-- Controls -->
      <div class="controls">
        <div class="search-box">
          <i class='bx bx-search'></i>
          <input type="text" id="searchInput" placeholder="Search inventory…" oninput="renderTable()">
        </div>
        <select class="filter-select" id="statusFilter" onchange="renderTable()">
          <option value="">All Status</option>
          <option value="Available">Available</option>
          <option value="Low Stock">Low Stock</option>
          <option value="Out of Stock">Out of Stock</option>
        </select>
        <select class="filter-select" id="categoryFilter" onchange="renderTable()">
          <option value="">All Categories</option>
        </select>
        <button class="btn-add" onclick="openAddModal()">
          <i class='bx bx-plus'></i> Add Item
        </button>
      </div>

      <!-- Table Card -->
      <div class="table-card">
        <table id="inventoryTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div class="pagination" id="paginationRow"></div>
      </div>
    </div>
  </div>

  <!-- ===================== ADD / EDIT MODAL ===================== -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-box" id="modalBox">
      <div class="modal-header">
        <h2 id="modalTitle">Add Item</h2>
        <button class="modal-close" onclick="closeModal()"><i class='bx bx-x'></i></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveItem()">Save</button>
      </div>
    </div>
  </div>

  <!-- ===================== DELETE CONFIRM MODAL ===================== -->
  <div class="modal-overlay" id="deleteOverlay" onclick="closeDelete(event)">
    <div class="modal-box modal-sm" id="deleteBox">
      <div class="modal-header">
        <h2>Confirm Delete</h2>
        <button class="modal-close" onclick="closeDelete()"><i class='bx bx-x'></i></button>
      </div>
      <div class="modal-body">
        <p style="color:#555;font-size:14px;">Are you sure you want to delete <strong id="deleteItemName"></strong>? This action cannot be undone.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeDelete()">Cancel</button>
        <button class="btn-save btn-danger" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <script src="shared.js"></script>
  <script src="inventory.js"></script>
</body>
</html>
